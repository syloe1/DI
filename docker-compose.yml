services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-admin-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_SERVER_PORT: "19999"
      APP_MYSQL_HOST: mysql
      APP_MYSQL_PORT: "3306"
      APP_MYSQL_DBNAME: go
      APP_MYSQL_USERNAME: root
      APP_MYSQL_PASSWORD: "123456"
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: "6379"
      APP_REDIS_PASSWORD: ""
      APP_REDIS_DB: "0"
      APP_JWT_SECRET: "syloe1-change-this-in-production"
    ports:
      - "19999:19999"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: go-admin-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: go
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
    healthcheck: # 检查mysql是否启动
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: go-admin-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
